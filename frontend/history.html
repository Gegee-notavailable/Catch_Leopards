<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leopard Detection - History</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles/style.css">
    <style>
        body {
            font-family: 'Roboto Slab', serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .history-page-container {
            padding: 40px;
            max-width: 1200px; /* เพิ่มความกว้างสูงสุด */
            margin: 0 auto;
            position: relative;
        }

        /* ปุ่ม Back มุมซ้ายบน */
        .back-dashboard-btn {
            position: absolute;
            top: 20px;
            left: 40px;
            background-color: #2b2b2b;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            border: 1px solid #444;
            transition: 0.3s;
        }

        .back-dashboard-btn:hover {
            background-color: #ffc107;
            color: #000;
            border-color: #ffc107;
        }

        .history-header {
            text-align: center;
            margin-top: 60px;
            margin-bottom: 40px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .history-header h1 {
            font-size: 2.8rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* จัดการตารางให้เต็มพื้นที่และดูดี */
        .table-responsive {
            width: 100%;
            background: #1e1e1e;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .history-table th {
            background-color: #2b2b2b;
            color: #ffc107;
            padding: 20px;
            font-size: 1.1rem;
            text-transform: uppercase;
            border-bottom: 2px solid #333;
        }

        .history-table td {
            padding: 18px 20px;
            border-bottom: 1px solid #2a2a2a;
            font-size: 1rem;
            color: #d1d1d1;
        }

        /* ไฮไลท์สถานะให้เด่น */
        .status-highlight {
            font-weight: bold;
            color: #ffffff; /* ปรับสถานะเป็นสีขาวตามที่พี่ชอบ */
        }

        .date-cell {
            color: #ffc107; /* วันที่เป็นสีเหลืองเพื่อให้เด่น */
            font-weight: bold;
        }

        .history-table tr:hover {
            background-color: #252525;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <main class="history-page-container">
            <a href="index.html" class="back-dashboard-btn">← BACK</a>

            <header class="history-header">
                <h1>Detection History</h1>
            </header>

            <div class="table-responsive">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th style="width: 25%;">Date</th>
                            <th style="width: 25%;">Time</th>
                            <th style="width: 50%;">Detection Status</th>
                        </tr>
                    </thead>
                    <tbody id="history-table-body">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module" src="./scripts/app.js"></script>
</body>
</html>
